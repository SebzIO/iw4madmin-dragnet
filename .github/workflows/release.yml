name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  release:
    types:
      - published
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore tests/Dragnet.Tests/Dragnet.Tests.csproj

      - name: Run tests
        run: dotnet run --no-restore --project tests/Dragnet.Tests/Dragnet.Tests.csproj

      - name: Package plugin
        run: SKIP_RESTORE=1 PACKAGE_VERSION="${PACKAGE_VERSION}" ./scripts/package-release.sh
        env:
          PACKAGE_VERSION: ${{ github.event.release.tag_name || github.ref_name }}

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: dragnet-iw4madmin-plugin
          path: artifacts/*.zip
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          tag_name: ${{ github.event.release.tag_name || github.ref_name }}
